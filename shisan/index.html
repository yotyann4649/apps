<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>城主の資産要塞</title>
<style>
  :root{
    --sumi:#13161c; --konjo:#1b2433; --konjoLite:#243047; --ishi:#2d3a4f;
    --kin:#c9a44c; --kinLite:#e3c574; --washi:#ece4d3; --washiSub:#9aa3b2;
    --ai:#5b8fb0; --matsu:#7faa78; --beni:#c17b7b; --murasaki:#9d8ec4; --line:#2a3547;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:linear-gradient(180deg,var(--sumi) 0%,#0f1218 100%);
    min-height:100vh; color:var(--washi);
    font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  }
  .wrap{max-width:680px; margin:0 auto;}
  header{padding:22px 22px 16px; position:relative; overflow:hidden;}
  .goldline{position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg,transparent,var(--kin),var(--kinLite),var(--kin),transparent);}
  .eyebrow{font-size:10px; letter-spacing:6px; color:var(--kin); margin-bottom:6px;}
  h1{margin:0; font-size:26px; font-weight:700; letter-spacing:3px;
    background:linear-gradient(180deg,var(--kinLite),var(--kin));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .subtitle{margin:6px 0 0; font-size:11px; color:var(--washiSub); letter-spacing:1px;}

  .summary{display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px;
    background:var(--line); margin:0 14px; border-radius:8px; overflow:hidden; border:1px solid var(--ishi);}
  .summary>div{background:var(--konjo); padding:12px 6px; text-align:center;}
  .summary .lbl{font-size:9.5px; color:var(--washiSub); margin-bottom:3px;}
  .summary .val{font-size:18px; font-weight:700;}
  .summary .val span{font-size:9px; color:var(--washiSub);}

  .miles{display:flex; gap:6px; padding:12px 14px 0; overflow-x:auto;}
  .mile{flex-shrink:0; padding:6px 12px; border-radius:20px; background:var(--konjo);
    border:1px solid rgba(201,164,76,0.27); font-size:11px; white-space:nowrap;}
  .mile b{color:var(--kinLite); font-weight:700;}
  .mile span{color:var(--washiSub);}

  nav{display:flex; gap:4px; padding:16px 14px 0; overflow-x:auto;}
  nav button{flex-shrink:0; padding:9px 15px; font-size:13px; cursor:pointer; border:none;
    border-radius:8px 8px 0 0; letter-spacing:1px; font-family:inherit; background:transparent;
    color:var(--washiSub); border-bottom:2px solid transparent;}
  nav button.active{background:var(--konjo); color:var(--kinLite); font-weight:700; border-bottom:2px solid var(--kin);}

  main{padding:0 14px 28px;}
  .panel{background:var(--konjo); border-radius:0 10px 10px 10px; border:1px solid var(--line);
    padding:18px 16px; box-shadow:0 8px 30px rgba(0,0,0,0.4);}

  .sectitle{display:flex; align-items:baseline; justify-content:space-between;
    padding-bottom:6px; margin-bottom:4px;}
  .sectitle .l{font-size:14px; font-weight:700; letter-spacing:2px;}
  .sectitle .s{font-size:10px; color:var(--washiSub); margin-left:8px;}
  .sectitle .tot{font-size:14px; font-weight:700;}

  .row{display:grid; grid-template-columns:26px 1fr auto; align-items:center; gap:10px;
    padding:10px 4px; border-bottom:1px solid var(--line);}
  .row .ic{font-size:15px; text-align:center; opacity:.9;}
  .row .lb{font-size:13px; color:var(--washi); letter-spacing:.5px;}
  .stepper{display:flex; align-items:center; gap:6px;}
  .stepper button{width:24px; height:24px; border-radius:4px; border:1px solid var(--ishi);
    background:var(--konjoLite); color:var(--washi); font-size:14px; cursor:pointer; line-height:1;
    display:flex; align-items:center; justify-content:center; padding:0;}
  .stepper input{width:62px; background:var(--sumi); border-radius:4px; font-size:15px; font-weight:700;
    padding:5px 6px; text-align:right; outline:none; font-family:'Hiragino Mincho ProN',serif;}
  .stepper .u{font-size:10px; color:var(--washiSub); width:18px;}

  .card{background:var(--sumi); border-radius:10px; padding:18px; border:1px solid rgba(201,164,76,0.27); margin-bottom:18px;}
  .totlabel{font-size:11px; color:var(--washiSub); letter-spacing:1px; text-align:center;}
  .totval{font-size:30px; font-weight:700; color:var(--kinLite); margin:2px 0 6px; text-align:center;}
  .totval span{font-size:14px; color:var(--washi);}

  .toggle{display:flex; justify-content:center; gap:4px; margin:10px 0 6px;}
  .toggle button{padding:5px 14px; font-size:11px; cursor:pointer; font-family:inherit;
    border:1px solid var(--ishi); border-radius:16px; background:transparent; color:var(--washiSub); letter-spacing:1px;}
  .toggle button.on{border-color:var(--kin); background:rgba(201,164,76,0.13); color:var(--kinLite);}

  .legend3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-top:12px;}
  .legend3>div{text-align:center; padding:8px 4px; background:var(--konjo); border-radius:6px;}
  .legend3 .nm{font-size:10px; margin-bottom:2px;}
  .legend3 .am{font-size:14px; color:var(--washi); font-weight:700;}
  .legend3 .am span{font-size:9px; color:var(--washiSub);}
  .legend3 .pc{font-size:10px; color:var(--washiSub);}

  .note{margin-top:12px; padding:10px 12px; background:var(--sumi); border-radius:8px;
    border:1px solid var(--line); font-size:11px; color:var(--washiSub); line-height:1.6;}
  .note b{color:var(--kinLite);}

  .balbox{margin-top:16px; padding:16px; border-radius:8px; background:var(--sumi);}
  .balrow{display:flex; justify-content:space-between; align-items:baseline;}
  .balrow .t{font-size:13px; color:var(--washi);}
  .balrow .v{font-size:24px; font-weight:700;}
  .balrow .v span{font-size:12px;}
  .balsub{font-size:11px; color:var(--washiSub); text-align:right; margin-top:4px;}

  .special{display:grid; grid-template-columns:64px 1fr 74px 28px; gap:8px; align-items:center;
    padding:8px 0; border-bottom:1px solid var(--line);}
  .special select,.special input{background:var(--sumi); border:1px solid var(--ishi); border-radius:4px;
    font-size:12px; padding:6px 6px; font-family:inherit; outline:none; width:100%;}
  .special select{color:var(--kinLite);}
  .special .lbi{color:var(--washi);}
  .special .ami{color:var(--kinLite); font-weight:700; text-align:right; font-family:serif; border-color:rgba(201,164,76,0.33);}
  .special .del{width:26px; height:26px; border-radius:4px; border:1px solid rgba(193,123,123,0.27);
    background:transparent; color:var(--beni); font-size:14px; cursor:pointer; padding:0;}
  .addbtn{margin-top:14px; width:100%; padding:11px; background:rgba(201,164,76,0.09);
    border:1px solid rgba(201,164,76,0.33); border-radius:8px; color:var(--kinLite);
    font-size:13px; cursor:pointer; font-family:inherit; letter-spacing:1px;}

  table{width:100%; border-collapse:collapse; font-size:12px;}
  thead tr{border-bottom:2px solid rgba(201,164,76,0.33);}
  th{padding:8px; color:var(--kinLite); text-align:right; font-weight:600; font-size:11px;}
  td{padding:6px 8px; text-align:right;}
  tbody tr{border-bottom:1px solid var(--line);}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px;}
  .stat{background:var(--sumi); border:1px solid var(--line); border-radius:8px; padding:12px 13px;}
  .stat .l{font-size:10px; color:var(--washiSub);}
  .stat .v{font-size:18px; font-weight:700; margin:3px 0; font-family:serif;}
  .stat .s{font-size:9px; color:var(--ishi);}

  .resetbtn{margin-top:18px; width:100%; padding:11px; background:transparent;
    border:1px solid var(--ishi); border-radius:8px; color:var(--washiSub);
    font-size:12px; cursor:pointer; font-family:inherit; letter-spacing:1px;}
  .foot{font-size:10px; color:var(--ishi); text-align:center; margin-top:14px; line-height:1.6;}

  /* SVG tooltip */
  #tip{position:fixed; pointer-events:none; background:var(--sumi); border:1px solid rgba(201,164,76,0.33);
    border-radius:6px; font-size:12px; color:var(--washi); padding:6px 10px; opacity:0; transition:opacity .1s;
    z-index:50; white-space:nowrap;}
  .scroll{overflow-x:auto;}
  input[type=number]{-moz-appearance:textfield;}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="goldline"></div>
    <div class="eyebrow">財 政 要 塞</div>
    <h1>城主の資産要塞</h1>
    <p class="subtitle">月々の変動を見据え、生涯の財を築く</p>
  </header>

  <div class="summary" id="summary"></div>
  <div class="miles" id="miles"></div>
  <nav id="nav"></nav>

  <main><div class="panel" id="panel"></div>
    <div style="padding:0 14px; margin-top:16px;">
      <button id="saveAppBtn" style="width:100%; padding:13px; background:linear-gradient(180deg,rgba(201,164,76,0.18),rgba(201,164,76,0.06)); border:1px solid rgba(201,164,76,0.45); border-radius:10px; color:#e3c574; font-size:13px; cursor:pointer; font-family:inherit; letter-spacing:1px;">
        ⬇ このアプリをパソコンに保存する
      </button>
      <p style="font-size:10px; color:#4a5260; text-align:center; margin:8px 0 0; line-height:1.6;">
        保存したファイルは、ネットがなくても開けます。<br>パソコンに置いて、いつでもお使いください。
      </p>

      <div style="margin-top:16px; padding-top:16px; border-top:1px solid #2a3547;">
        <p style="font-size:10px; color:#9aa3b2; text-align:center; margin:0 0 10px; line-height:1.6;">
          入力した数値は、このブラウザに自動で覚えさせています。<br>別のパソコン・別のブラウザに移すときや、念のための控えには、下のデータ書き出しをお使いください。
        </p>
        <div style="display:flex; gap:8px;">
          <button id="exportDataBtn" style="flex:1; padding:11px; background:transparent; border:1px solid #2d3a4f; border-radius:8px; color:#9aa3b2; font-size:12px; cursor:pointer; font-family:inherit; letter-spacing:.5px;">
            ⬇ データを書き出す
          </button>
          <button id="importDataBtn" style="flex:1; padding:11px; background:transparent; border:1px solid #2d3a4f; border-radius:8px; color:#9aa3b2; font-size:12px; cursor:pointer; font-family:inherit; letter-spacing:.5px;">
            ⬆ データを読み込む
          </button>
        </div>
        <input type="file" id="importDataFile" accept=".json" style="display:none">
        <p id="dataMsg" style="font-size:10px; text-align:center; margin:8px 0 0; line-height:1.6; min-height:14px;"></p>
      </div>
    </div>
    <p class="foot">概算試算です。税・インフレ・相場変動は含みません。<br>臨時の収入・出費は年額として将来試算に反映されます。退職後は給与・賞与を除きます。</p>
  </main>
</div>
<div id="tip"></div>

<script>
/* ─────────────── 状態 ─────────────── */
var T = {
  sumi:"#13161c", konjo:"#1b2433", konjoLite:"#243047", ishi:"#2d3a4f",
  kin:"#c9a44c", kinLite:"#e3c574", washi:"#ece4d3", washiSub:"#9aa3b2",
  ai:"#5b8fb0", matsu:"#7faa78", beni:"#c17b7b", murasaki:"#9d8ec4", line:"#2a3547"
};
var MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
var INCOME_CATS = [
  {key:"salary",  label:"給与（手取り）", icon:"🏯", def:25},
  {key:"bonus",   label:"賞与（月割）",   icon:"🎁", def:8},
  {key:"pension", label:"年金",       icon:"🛡️", def:0},
  {key:"side",    label:"副収入・事業",   icon:"🌱", def:0}
];
var EXPENSE_CATS = [
  {key:"housing", label:"住宅ローン",     icon:"🏠", def:8},
  {key:"food",    label:"食費",           icon:"🍚", def:4},
  {key:"utility", label:"水道光熱・通信", icon:"💡", def:2},
  {key:"daily",   label:"日用・雑費",     icon:"🧺", def:1.5},
  {key:"insure",  label:"保険・医療",     icon:"⚕️", def:1},
  {key:"leisure", label:"趣味・交際",     icon:"🍶", def:1},
  {key:"other",   label:"その他",         icon:"—",  def:0}
];
function defaults(){
  var inc={},exp={};
  INCOME_CATS.forEach(function(c){inc[c.key]=c.def;});
  EXPENSE_CATS.forEach(function(c){exp[c.key]=c.def;});
  return {
    currentAge:35, retireAge:60, indepAge:40, startMonth:(new Date().getMonth()+1), initCash:100, initNisa:100, initIdeco:0,
    income:inc, expense:exp,
    specials:[
      {id:1, month:6,  label:"車検・自動車税", amount:10},
      {id:2, month:8,  label:"夏の帰省・旅行", amount:8},
      {id:3, month:12, label:"年末・冬の出費", amount:6}
    ],
    specialIncomes:[
      {id:1, month:1,  label:"お祝い・臨時収入", amount:0}
    ],
    nisoMonthly:3, nisoSwitchAge1:40, nisoMonthly2:5,
    nisoSwitchAge2:45, nisoMonthly3:10, iDecoMonthly:1, returnRate:4
  };
}
var p = defaults();
var tab = "ledger";
var assetView = "pie";
var nextId = 100;

/* ─────────────── データの保存・復元 ─────────────── */
var STORAGE_KEY = "shisan_yousai_v1";

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({p:p, tab:tab, assetView:assetView, nextId:nextId, savedAt:Date.now()}));
  }catch(e){ /* localStorageが使えない環境（file://制限等）は無視して続行 */ }
}

function loadState(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    var d = JSON.parse(raw);
    if(d && d.p){
      p = d.p; tab = d.tab||"ledger"; assetView = d.assetView||"pie"; nextId = d.nextId||100;
      // 後から追加されたフィールドが古い保存データに無い場合のフォールバック
      if(!p.specialIncomes) p.specialIncomes=[];
      return true;
    }
  }catch(e){ /* 壊れた保存データは無視してdefaultsのまま続行 */ }
  return false;
}

// 起動時：前回の続きがあれば自動で復元
var restored = loadState();

// JSONファイルとしてデータだけを書き出す
function exportData(){
  try{
    var payload = JSON.stringify({p:p, tab:tab, assetView:assetView, nextId:nextId}, null, 2);
    var blob = new Blob([payload], {type:"application/json;charset=utf-8"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var today = new Date();
    var ymd = today.getFullYear()+String(today.getMonth()+1).padStart(2,'0')+String(today.getDate()).padStart(2,'0');
    a.href = url; a.download = "資産要塞データ_"+ymd+".json"; a.click();
    URL.revokeObjectURL(url);
    return true;
  }catch(e){ return false; }
}

// JSONファイルからデータを読み込む
function importDataFile(file, cb){
  var reader = new FileReader();
  reader.onload = function(ev){
    try{
      var d = JSON.parse(ev.target.result);
      if(!d || !d.p) throw new Error("形式が違います");
      p = d.p; tab = d.tab||"ledger"; assetView = d.assetView||"pie"; nextId = d.nextId||100;
      if(!p.specialIncomes) p.specialIncomes=[];
      saveState();
      cb(true);
    }catch(e){ cb(false); }
  };
  reader.onerror = function(){ cb(false); };
  reader.readAsText(file);
}

/* ─────────────── 計算 ─────────────── */
function fmt(v){
  if(v>=10000){var o=v/10000; return (o%1===0?o:o.toFixed(1))+"億";}
  return v+"万";
}
function sum(obj){var s=0; for(var k in obj){s+=obj[k];} return s;}

function compute(){
  var incomeTotal=sum(p.income);
  var baseExpense=sum(p.expense);
  var investMonthly=p.nisoMonthly+p.iDecoMonthly;
  var totalNow=p.initCash+p.initNisa+p.initIdeco;
  var specialYearTotal=p.specials.reduce(function(a,s){return a+s.amount;},0);
  var specialIncomeYearTotal=(p.specialIncomes||[]).reduce(function(a,s){return a+s.amount;},0);
  var expenseYearTotal=baseExpense*12+specialYearTotal;
  var incomeYearTotal=incomeTotal*12+specialIncomeYearTotal;
  var incomeMonthAvg=incomeYearTotal/12;
  var expenseMonthAvg=expenseYearTotal/12;
  var monthlyBalanceAvg=incomeMonthAvg-expenseMonthAvg-investMonthly;

  var monthlyExpense=MONTHS.map(function(_,i){
    var m=i+1;
    var sp=p.specials.filter(function(s){return s.month===m;}).reduce(function(a,s){return a+s.amount;},0);
    var spi=(p.specialIncomes||[]).filter(function(s){return s.month===m;}).reduce(function(a,s){return a+s.amount;},0);
    return {month:MONTHS[i], base:baseExpense, special:sp, total:baseExpense+sp, income:spi};
  });

  var rows=[]; var cash=p.initCash, nisa=p.initNisa, ideco=p.initIdeco;
  var rate=p.returnRate/100; var incY=incomeYearTotal; var expY=expenseYearTotal;
  var startM=p.startMonth||1;
  var firstFrac=(13-startM)/12; // 開始年の残り月数の割合（1月開始=1.0、6月開始=7/12）
  var firstIdx=true;
  for(var age=p.currentAge; age<=72; age++){
    var year=2026+(age-p.currentAge);
    var frac=firstIdx?firstFrac:1; // 最初の年だけ残り月数分
    var nisoM = age>=p.nisoSwitchAge2 ? p.nisoMonthly3 : age>=p.nisoSwitchAge1 ? p.nisoMonthly2 : p.nisoMonthly;
    var incThis = age<p.retireAge ? incY : (p.income.pension+p.income.side)*12+specialIncomeYearTotal;
    var nisoY=nisoM*12*frac, idecoY=p.iDecoMonthly*12*frac;
    var rThis=rate*frac; // 運用も期間に応じて
    nisa=(nisa+nisoY)*(1+rThis);
    ideco=(ideco+idecoY)*(1+rThis);
    cash += incThis*frac - expY*frac - nisoY - idecoY;
    rows.push({age:age, year:year, total:Math.round(cash+nisa+ideco),
      cash:Math.round(cash), nisa:Math.round(nisa), ideco:Math.round(ideco), ret:Math.round(nisa*rate),
      partial:firstIdx&&frac<1});
    firstIdx=false;
  }
  var peak=Math.max.apply(null, rows.map(function(r){return r.total;}));
  var mTargets=[]; for(var v=1000; v<=peak; v+=1000){mTargets.push(v);}
  var milestones=mTargets.map(function(v){
    for(var i=0;i<rows.length;i++){
      if(rows[i].total>=v && (i===0||rows[i-1].total<v)) return {v:v, age:rows[i].age};
    } return null;
  }).filter(Boolean);

  // 経済的自由（4%ルール）：必要資産＝年間支出×25。資産推移の中で最初に到達する年齢
  var needFI=expenseYearTotal*25;
  var fiAge=null, fiYear=null;
  for(var fi=0; fi<rows.length; fi++){
    if(rows[fi].total>=needFI){ fiAge=rows[fi].age; fiYear=rows[fi].year; break; }
  }

  // 独立シミュレーション：指定年齢で独立し、無収入になった場合に何年もつか
  var pensionYear=(p.income.pension+p.income.side)*12+specialIncomeYearTotal; // 給与賞与を除いた年収
  function assetsAtAge(a){
    for(var i=0;i<rows.length;i++){ if(rows[i].age===a) return rows[i].total; }
    return rows[rows.length-1].total;
  }
  // 指定年齢で独立した場合の耐久年数（2パターン）
  function survivalYears(a){
    var assets=assetsAtAge(a);
    var burnFull=expenseYearTotal;                         // 収入ゼロ：支出まるごと取り崩し
    var burnPart=Math.max(0, expenseYearTotal-pensionYear);// 年金等のみ残す：差額だけ取り崩し
    return {
      assets:assets,
      full: burnFull>0 ? assets/burnFull : 999,
      part: burnPart>0 ? assets/burnPart : 999,
      partInfinite: burnPart<=0   // 年金等だけで支出を賄える＝無限
    };
  }
  // 「N年耐える」のに必要な独立年齢（収入ゼロ基準）を逆算
  function ageToSurvive(years){
    var need=expenseYearTotal*years;
    for(var i=0;i<rows.length;i++){ if(rows[i].total>=need) return rows[i].age; }
    return null;
  }

  return {incomeTotal:incomeTotal, baseExpense:baseExpense, investMonthly:investMonthly,
    totalNow:totalNow, specialYearTotal:specialYearTotal, expenseYearTotal:expenseYearTotal,
    specialIncomeYearTotal:specialIncomeYearTotal, incomeYearTotal:incomeYearTotal, incomeMonthAvg:incomeMonthAvg,
    expenseMonthAvg:expenseMonthAvg, monthlyBalanceAvg:monthlyBalanceAvg,
    needFI:needFI, fiAge:fiAge, fiYear:fiYear,
    pensionYear:pensionYear, survivalYears:survivalYears, ageToSurvive:ageToSurvive, assetsAtAge:assetsAtAge,
    monthlyExpense:monthlyExpense, rows:rows, mTargets:mTargets, milestones:milestones,
    retire: rows.filter(function(r){return r.age===p.retireAge;})[0] || rows[rows.length-1]};
}

/* ─────────────── SVG描画 ─────────────── */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ドーナツ円グラフ
function donutSVG(segs, total){
  var size=200, cx=size/2, cy=size/2, rO=82, rI=52;
  var ang=-90; var paths="";
  segs.forEach(function(s){
    if(s.value<=0) return;
    var frac=total>0?s.value/total:0;
    var a0=ang, a1=ang+frac*360; ang=a1;
    // 隙間
    var gap=1.2; a0+=gap; a1-=gap;
    var large=(a1-a0)>180?1:0;
    var r0=a0*Math.PI/180, r1=a1*Math.PI/180;
    var x0o=cx+rO*Math.cos(r0), y0o=cy+rO*Math.sin(r0);
    var x1o=cx+rO*Math.cos(r1), y1o=cy+rO*Math.sin(r1);
    var x0i=cx+rI*Math.cos(r1), y0i=cy+rI*Math.sin(r1);
    var x1i=cx+rI*Math.cos(r0), y1i=cy+rI*Math.sin(r0);
    var pct=Math.round(frac*100);
    paths += '<path d="M'+x0o+' '+y0o+' A'+rO+' '+rO+' 0 '+large+' 1 '+x1o+' '+y1o+
      ' L'+x0i+' '+y0i+' A'+rI+' '+rI+' 0 '+large+' 0 '+x1i+' '+y1i+' Z" fill="'+s.color+
      '" stroke="'+T.sumi+'" stroke-width="2" class="seg" '+
      'data-tip="'+esc(s.name)+' '+s.value+'万円（'+pct+'%）"></path>';
  });
  return '<svg viewBox="0 0 '+size+' '+size+'" width="100%" height="200" style="display:block">'+paths+'</svg>'+
    '<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none">'+
    '<div style="font-size:9px; color:'+T.washiSub+'">三資産の</div>'+
    '<div style="font-size:13px; color:'+T.kinLite+'; font-weight:700">内訳</div></div>';
}

// 横バー
function hbarSVG(segs, total){
  var html='<div style="display:flex; height:28px; border-radius:6px; overflow:hidden; gap:2px">';
  segs.forEach(function(s){
    if(s.value<=0) return;
    var pct=total>0?Math.round(s.value/total*100):0;
    var show=total>0 && (s.value/total)>0.08;
    html+='<div class="seg" data-tip="'+esc(s.name)+' '+s.value+'万円（'+pct+'%）" '+
      'style="flex:'+Math.max(s.value,0.01)+'; background:'+s.color+'; border-radius:4px; '+
      'display:flex; align-items:center; justify-content:center">'+
      (show?'<span style="font-size:11px; color:'+T.sumi+'; font-weight:700">'+pct+'%</span>':'')+'</div>';
  });
  return html+'</div>';
}

// 月別出費 棒グラフ
function monthBarSVG(data){
  var W=560, H=170, pad=28, bw=W/12;
  var max=Math.max.apply(null, data.map(function(d){return d.total;}))||1;
  var bars="", labels="";
  data.forEach(function(d,i){
    var x=i*bw+bw*0.2, w=bw*0.6;
    var bh=(d.base/max)*(H-pad-10);
    var sh=(d.special/max)*(H-pad-10);
    var yBase=H-pad-bh;
    var ySp=yBase-sh;
    bars+='<rect x="'+x+'" y="'+yBase+'" width="'+w+'" height="'+bh+'" fill="'+T.beni+'" class="seg" data-tip="'+d.month+' 基本 '+d.base.toFixed(1)+'万"></rect>';
    if(d.special>0) bars+='<rect x="'+x+'" y="'+ySp+'" width="'+w+'" height="'+sh+'" fill="'+T.kin+'" rx="2" class="seg" data-tip="'+d.month+' 臨時 '+d.special.toFixed(1)+'万"></rect>';
    labels+='<text x="'+(x+w/2)+'" y="'+(H-pad+14)+'" fill="'+T.washiSub+'" font-size="9" text-anchor="middle">'+(i+1)+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="170" style="display:block">'+bars+labels+'</svg>';
}

// 折れ線（資産推移）
function lineSVG(rows, mTargets){
  var W=560, H=290, padL=46, padB=24, padT=10, padR=10;
  var iw=W-padL-padR, ih=H-padT-padB;
  var maxV=Math.max.apply(null, rows.map(function(r){return r.total;}))||1;
  var ages=rows.map(function(r){return r.age;});
  var minA=ages[0], maxA=ages[ages.length-1];
  function X(a){return padL+(a-minA)/(maxA-minA)*iw;}
  function Y(v){return padT+(1-v/maxV)*ih;}
  // 参照線
  var refs="";
  mTargets.filter(function(v){return v%2000===0||v===1000;}).forEach(function(v){
    var y=Y(v);
    refs+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="'+T.ishi+'" stroke-dasharray="3 3" stroke-width="1"></line>'+
      '<text x="'+(W-padR)+'" y="'+(y-2)+'" fill="'+T.washiSub+'" font-size="9" text-anchor="end">'+fmt(v)+'</text>';
  });
  // 退職ライン
  var rx=X(p.retireAge);
  refs+='<line x1="'+rx+'" y1="'+padT+'" x2="'+rx+'" y2="'+(H-padB)+'" stroke="'+T.beni+'" stroke-dasharray="4 2" stroke-width="1"></line>'+
    '<text x="'+rx+'" y="'+(padT+10)+'" fill="'+T.beni+'" font-size="11" text-anchor="middle">退</text>';
  // 各系列
  function poly(key,color,w,fill){
    var pts=rows.map(function(r){return X(r.age)+","+Y(r[key]);}).join(" ");
    var s='<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="'+w+'"></polyline>';
    if(fill){
      var area=padL+","+(H-padB)+" "+pts+" "+(W-padR)+","+(H-padB);
      s='<polygon points="'+area+'" fill="'+color+'" opacity="0.12"></polygon>'+s;
    }
    return s;
  }
  // 軸ラベル(年齢)
  var xl="";
  for(var a=minA; a<=maxA; a+=6){
    xl+='<text x="'+X(a)+'" y="'+(H-padB+14)+'" fill="'+T.washiSub+'" font-size="9" text-anchor="middle">'+a+'</text>';
  }
  // ホバー用の縦帯（年齢ごと）
  var hot="";
  rows.forEach(function(r){
    hot+='<rect x="'+(X(r.age)-iw/(maxA-minA)/2)+'" y="'+padT+'" width="'+(iw/(maxA-minA))+'" height="'+ih+'" fill="transparent" class="seg" data-tip="'+r.age+'歳　総資産'+fmt(r.total)+' / NISA'+fmt(r.nisa)+' / 現金'+fmt(r.cash)+'"></rect>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="290" style="display:block">'+
    refs+
    poly("cash",T.ai,1.5,false)+poly("nisa",T.matsu,1.5,false)+poly("total",T.kin,2.5,true)+
    xl+hot+'</svg>';
}

    // ①4%ルール（必要資産とFI到達年齢）
    h+='<div style="font-size:11px; color:'+T.washiSub+'; margin:8px 0 8px; line-height:1.7">① 運用益（年4%）だけで暮らす「経済的自由」の水準です。</div>';
    h+='<div style="background:'+T.sumi+'; border:1px solid '+T.kin+'44; border-radius:10px; padding:16px; text-align:center; margin-bottom:10px">'+
      '<div style="font-size:11px; color:'+T.washiSub+'">永続に必要な資産（年間支出 '+fmt(expY)+'万 ×25）</div>'+
      '<div style="font-size:24px; font-weight:700; color:'+T.kinLite+'; font-family:serif; margin:4px 0">'+c.needFI.toLocaleString()+'<span style="font-size:13px; color:'+T.washi+'"> 万円</span></div></div>';
    if(c.fiAge!==null){
      var fromNow=c.fiAge-p.currentAge;
      h+='<div style="background:'+T.sumi+'; border:1px solid '+T.kinLite+'55; border-radius:10px; padding:16px; text-align:center; margin-bottom:6px">'+
        '<div style="font-size:11px; color:'+T.washiSub+'">この計画なら、経済的自由に到達するのは</div>'+
        '<div style="font-size:26px; font-weight:700; color:'+T.kinLite+'; font-family:serif; margin:4px 0">'+c.fiAge+'<span style="font-size:14px; color:'+T.washi+'"> 歳</span> <span style="font-size:13px; color:'+T.washiSub+'">('+c.fiYear+'年)</span></div>'+
        '<div style="font-size:11px; color:'+T.matsu+'">いまから '+fromNow+'年後 ―― 退き際('+p.retireAge+'歳)'+(c.fiAge<=p.retireAge?'までに到達':'より後')+'</div></div>';
    } else {
      h+='<div style="background:'+T.sumi+'; border:1px solid '+T.beni+'44; border-radius:10px; padding:16px; text-align:center; margin-bottom:6px">'+
        '<div style="font-size:12px; color:'+T.washi+'; line-height:1.7">72歳までの試算では、まだ到達しません。<br><span style="font-size:11px; color:'+T.washiSub+'">支出を抑えるか、積立・年利を見直すと近づきます。</span></div></div>';
    }
    h+='<div style="font-size:11px; color:'+T.washiSub+'; text-align:center; margin:4px 0 2px">いまの総資産での達成度　<b style="color:'+(nowRate>=100?T.kinLite:T.washi)+'">'+Math.round(nowRate)+'%</b></div>';
    h+='<div style="height:12px; border-radius:6px; overflow:hidden; background:'+T.line+'; margin:4px 0 0"><div style="width:'+Math.min(100,nowRate)+'%; height:100%; background:linear-gradient(90deg,'+T.kin+','+T.kinLite+')"></div></div>';

    // ②取り崩し（今の資産で何年）
    h+='<div style="height:20px"></div>';
    h+='<div style="font-size:11px; color:'+T.washiSub+'; margin:0 0 8px; line-height:1.7">② いま無収入になり、運用せず貯えを取り崩した場合。</div>';
    h+='<div style="background:'+T.sumi+'; border:1px solid '+T.ai+'44; border-radius:10px; padding:16px; text-align:center">'+
      '<div style="font-size:11px; color:'+T.washiSub+'">いまの総資産で暮らせる年数</div>';
    if(expY>0){
      var yi=Math.floor(nowYears), mo=Math.round((nowYears-yi)*12);
      h+='<div style="font-size:26px; font-weight:700; color:'+T.ai+'; font-family:serif; margin:4px 0">約 '+yi+'<span style="font-size:13px; color:'+T.washi+'"> 年</span>'+(mo>0?' '+mo+'<span style="font-size:13px; color:'+T.washi+'">ヶ月</span>':'')+'</div>'+
        '<div style="font-size:10px; color:'+T.ishi+'">総資産 '+fmt(nowAssets)+'万 ÷ 年間支出 '+fmt(expY)+'万</div>';
    } else {
      h+='<div style="font-size:16px; color:'+T.washiSub+'; margin:6px 0">支出を入力してください</div>';
    }
    h+='</div>';
    h+='<div style="margin-top:14px; font-size:10px; color:'+T.ishi+'; text-align:center; line-height:1.7">※ 概算です。インフレ・税・運用変動は含みません。4%ルールは目安です。</div>';
    return h;
  }
  if(tab==="table"){
    var h='<div class="scroll"><table><thead><tr>'+
      ["齢","総資産","NISA","現金","iDeCo"].map(function(x){return '<th>'+x+'</th>';}).join('')+
      '</tr></thead><tbody>';
    c.rows.forEach(function(r,i){
      var mile=c.mTargets.some(function(v){return r.total>=v && (i===0||c.rows[i-1].total<v);});
      var isR=r.age===p.retireAge;
      var bg=mile?"rgba(201,164,76,0.08)":(isR?"rgba(193,123,123,0.07)":"transparent");
      h+='<tr style="background:'+bg+'">'+
        '<td style="color:'+(isR?T.beni:T.washi)+'; font-weight:'+(isR||mile?700:400)+'">'+r.age+(mile?" ⬥":"")+(r.partial?' <span style="font-size:9px;color:'+T.washiSub+'">初年</span>':'')+'</td>'+
        '<td style="color:'+T.kinLite+'; font-weight:700; font-family:serif">'+r.total.toLocaleString()+'</td>'+
        '<td style="color:'+T.matsu+'">'+r.nisa.toLocaleString()+'</td>'+
        '<td style="color:'+T.ai+'">'+r.cash.toLocaleString()+'</td>'+
        '<td style="color:'+T.murasaki+'">'+r.ideco.toLocaleString()+'</td></tr>';
    });
    h+='</tbody></table><div style="margin-top:8px; font-size:10px; color:'+T.ishi+'; text-align:right">単位：万円　⬥ 大台到達　紅行 = 退き際　「初年」＝開始月からの残り月数で計算</div></div>';
    return h;
  }
  if(tab==="indep"){
    var ia=p.indepAge;
    var sv=c.survivalYears(ia);
    var assets=sv.assets;
    var fromNow=ia-p.currentAge;

    var h='<div style="font-size:11px; color:'+T.washiSub+'; text-align:center; margin-bottom:14px; line-height:1.8">独立して、給与・賞与が無くなったとき、<br>その時の貯えで何年もちこたえられるか。<br>「いつ飛び出せるか」を見極めるための試算です。</div>';

    // 独立年齢のステッパー
    h+=sectitle("独立する年齢","ここで給与・賞与が止まる",T.kinLite);
    h+=ledgerRow("🚀","独立する年齢",ia,"indepAge","age",T.kinLite,1);
    h+='<div style="background:'+T.sumi+'; border:1px solid '+T.line+'; border-radius:10px; padding:14px; text-align:center; margin:10px 0 4px">'+
      '<div style="font-size:11px; color:'+T.washiSub+'">その時（'+ia+'歳・いまから'+fromNow+'年後）の貯え</div>'+
      '<div style="font-size:24px; font-weight:700; color:'+T.kinLite+'; font-family:serif; margin:2px 0">'+Math.round(assets).toLocaleString()+'<span style="font-size:13px; color:'+T.washi+'"> 万円</span></div></div>';

    // パターン①完全ゼロ
    h+='<div style="height:18px"></div>';
    h+='<div class="sectitle" style="border-bottom:1px solid '+T.beni+'44"><div><span class="l" style="color:'+T.beni+'">① 収入ゼロで耐える</span><span class="s">最も厳しい想定</span></div></div>';
    h+='<div style="font-size:11px; color:'+T.washiSub+'; margin:8px 0; line-height:1.7">事業の収入も年金も一切なし。貯えだけで暮らす場合。</div>';
    var yf=Math.floor(sv.full), mf=Math.round((sv.full-yf)*12);
    h+='<div style="background:'+T.sumi+'; border:1px solid '+T.beni+'55; border-radius:10px; padding:16px; text-align:center">'+
      '<div style="font-size:11px; color:'+T.washiSub+'">無収入でもちこたえられる年数</div>'+
      '<div style="font-size:30px; font-weight:700; color:'+T.beni+'; font-family:serif; margin:4px 0">約 '+yf+'<span style="font-size:14px; color:'+T.washi+'"> 年</span>'+(mf>0?' '+mf+'<span style="font-size:14px; color:'+T.washi+'">ヶ月</span>':'')+'</div>'+
      '<div style="font-size:10px; color:'+T.ishi+'">貯え'+Math.round(assets).toLocaleString()+'万 ÷ 年間支出'+fmt(c.expenseYearTotal)+'万</div></div>';

    // パターン②年金・副収入を残す
    h+='<div style="height:20px"></div>';
    h+='<div class="sectitle" style="border-bottom:1px solid '+T.matsu+'44"><div><span class="l" style="color:'+T.matsu+'">② 年金・副収入は残す</span><span class="s">現実的な想定</span></div></div>';
    h+='<div style="font-size:11px; color:'+T.washiSub+'; margin:8px 0; line-height:1.7">給与・賞与は無いが、年金や副収入（年'+fmt(c.pensionYear)+'万）は続く場合。</div>';
    h+='<div style="background:'+T.sumi+'; border:1px solid '+T.matsu+'55; border-radius:10px; padding:16px; text-align:center">';
    if(sv.partInfinite){
      h+='<div style="font-size:13px; color:'+T.matsu+'; font-weight:700; line-height:1.7">✦ 年金・副収入だけで支出をまかなえます。<br>貯えを減らさず、ずっと暮らせる計算です。</div>';
    } else {
      var yp=Math.floor(sv.part), mp=Math.round((sv.part-yp)*12);
      h+='<div style="font-size:11px; color:'+T.washiSub+'">もちこたえられる年数</div>'+
        '<div style="font-size:30px; font-weight:700; color:'+T.matsu+'; font-family:serif; margin:4px 0">約 '+yp+'<span style="font-size:14px; color:'+T.washi+'"> 年</span>'+(mp>0?' '+mp+'<span style="font-size:14px; color:'+T.washi+'">ヶ月</span>':'')+'</div>'+
        '<div style="font-size:10px; color:'+T.ishi+'">貯え'+Math.round(assets).toLocaleString()+'万 ÷ 差額'+fmt(Math.max(0,c.expenseYearTotal-c.pensionYear))+'万/年</div>';
    }
    h+='</div>';

    // 逆算：3年・5年耐えるのは何歳から（収入ゼロ基準）
    h+='<div style="height:24px"></div>';
    h+=sectitle("いつ飛び出せるか","収入ゼロで耐えられる年齢",T.kin);
    var age3=c.ageToSurvive(3), age5=c.ageToSurvive(5);
    h+='<div style="font-size:11px; color:'+T.washiSub+'; margin:8px 0 10px; line-height:1.7">収入ゼロでも「3年／5年」もちこたえられる貯えに、いつ届くか。必ずしも'+p.retireAge+'歳まで待たなくてよいかもしれません。</div>';
    h+='<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">';
    function lozenge(label,age,col){
      if(age===null){
        return '<div style="background:'+T.sumi+'; border:1px solid '+T.line+'; border-radius:10px; padding:14px; text-align:center"><div style="font-size:11px; color:'+T.washiSub+'">'+label+'もちこたえる</div><div style="font-size:13px; color:'+T.washiSub+'; margin-top:4px; line-height:1.5">72歳まででは<br>届きません</div></div>';
      }
      var fn=age-p.currentAge;
      return '<div style="background:'+T.sumi+'; border:1px solid '+col+'55; border-radius:10px; padding:14px; text-align:center"><div style="font-size:11px; color:'+T.washiSub+'">'+label+'もちこたえる</div><div style="font-size:24px; font-weight:700; color:'+col+'; font-family:serif; margin:2px 0">'+age+'<span style="font-size:12px; color:'+T.washi+'">歳</span></div><div style="font-size:10px; color:'+T.matsu+'">いまから'+fn+'年後</div></div>';
    }
    h+=lozenge("3年",age3,T.kinLite);
    h+=lozenge("5年",age5,T.kin);
    h+='</div>';

    h+='<div style="margin-top:16px; font-size:10px; color:'+T.ishi+'; text-align:center; line-height:1.7">※ 概算です。事業が軌道に乗るまでの生活費の目安として。<br>インフレ・税・相場変動・独立後の初期費用は含みません。</div>';
    return h;
  }
  return "";
}

/* ─────────────── イベント ─────────────── */
function clamp(v){return v<0?0:v;}

function bindEvents(c){
  // タブ
  document.querySelectorAll('#nav button').forEach(function(b){
    b.onclick=function(){tab=b.getAttribute('data-tab'); render();};
  });
  var panel=document.getElementById('panel');

  // ステッパー＋／−
  panel.querySelectorAll('[data-act]').forEach(function(b){
    b.onclick=function(){
      var key=b.getAttribute('data-key'), kind=b.getAttribute('data-kind');
      var step=parseFloat(b.getAttribute('data-step'));
      var d=b.getAttribute('data-act')==='inc'?step:-step;
      applyVal(kind,key,function(old){return clamp(+(old+d).toFixed(1));});
      render();
    };
  });
  // 数値入力
  panel.querySelectorAll('[data-input]').forEach(function(inp){
    inp.onchange=function(){
      var key=inp.getAttribute('data-input'), kind=inp.getAttribute('data-kind');
      applyVal(kind,key,function(){return clamp(Number(inp.value));});
      render();
    };
  });
  // トグル
  panel.querySelectorAll('[data-view]').forEach(function(b){
    b.onclick=function(){assetView=b.getAttribute('data-view'); render();};
  });
  // 臨時出費
  panel.querySelectorAll('[data-sp]').forEach(function(inp){
    inp.onchange=function(){
      var id=Number(inp.getAttribute('data-id')), field=inp.getAttribute('data-sp');
      var val = field==="label" ? inp.value : (field==="month"?Number(inp.value):clamp(Number(inp.value)));
      p.specials=p.specials.map(function(s){if(s.id===id){s[field]=val;} return s;});
      render();
    };
  });
  var addb=panel.querySelector('[data-addsp]');
  if(addb) addb.onclick=function(){p.specials.push({id:nextId++, month:1, label:"臨時の出費", amount:5}); render();};
  panel.querySelectorAll('[data-delsp]').forEach(function(b){
    b.onclick=function(){var id=Number(b.getAttribute('data-delsp')); p.specials=p.specials.filter(function(s){return s.id!==id;}); render();};
  });
  // 臨時収入
  panel.querySelectorAll('[data-spi]').forEach(function(inp){
    inp.onchange=function(){
      var id=Number(inp.getAttribute('data-id')), field=inp.getAttribute('data-spi');
      var val = field==="label" ? inp.value : (field==="month"?Number(inp.value):clamp(Number(inp.value)));
      if(!p.specialIncomes) p.specialIncomes=[];
      p.specialIncomes=p.specialIncomes.map(function(s){if(s.id===id){s[field]=val;} return s;});
      render();
    };
  });
  var addbi=panel.querySelector('[data-addspi]');
  if(addbi) addbi.onclick=function(){if(!p.specialIncomes) p.specialIncomes=[]; p.specialIncomes.push({id:nextId++, month:1, label:"臨時の収入", amount:5}); render();};
  panel.querySelectorAll('[data-delspi]').forEach(function(b){
    b.onclick=function(){var id=Number(b.getAttribute('data-delspi')); p.specialIncomes=(p.specialIncomes||[]).filter(function(s){return s.id!==id;}); render();};
  });
  // リセット
  var rb=panel.querySelector('[data-reset]');
  if(rb) rb.onclick=function(){p=defaults(); nextId=100; render();};

  // SVGツールチップ
  var tip=document.getElementById('tip');
  panel.querySelectorAll('.seg').forEach(function(s){
    s.style.cursor="pointer";
    function show(e){
      var t=s.getAttribute('data-tip'); if(!t) return;
      tip.textContent=t; tip.style.opacity=1;
      var x=(e.touches?e.touches[0].clientX:e.clientX);
      var y=(e.touches?e.touches[0].clientY:e.clientY);
      tip.style.left=Math.min(x+12, window.innerWidth-tip.offsetWidth-8)+"px";
      tip.style.top=(y-40)+"px";
    }
    function hide(){tip.style.opacity=0;}
    s.addEventListener('mousemove',show);
    s.addEventListener('mouseleave',hide);
    s.addEventListener('touchstart',show,{passive:true});
    s.addEventListener('touchend',function(){setTimeout(hide,1200);});
  });
}

function applyVal(kind,key,fn){
  if(kind==="income") p.income[key]=fn(p.income[key]);
  else if(kind==="expense") p.expense[key]=fn(p.expense[key]);
  else p[key]=fn(p[key]);
  // 開始月は1〜12の範囲に収める
  if(key==="startMonth"){ p.startMonth=Math.max(1, Math.min(12, Math.round(p.startMonth)||1)); }
  // 独立年齢は現在の年齢〜72歳に収める
  if(key==="indepAge"){ p.indepAge=Math.max(p.currentAge, Math.min(72, Math.round(p.indepAge)||p.currentAge)); }
}

// このアプリ自身（HTMLファイル）をダウンロードする
(function(){
  var btn=document.getElementById('saveAppBtn');
  if(!btn) return;
  btn.onclick=function(){
    try{
      // 配布ファイルに家計データが残らないよう、保存の瞬間だけ画面の入力部分を空にする
      var summary=document.getElementById('summary'), miles=document.getElementById('miles'), panel=document.getElementById('panel');
      var savedSummary=summary.innerHTML, savedMiles=miles.innerHTML, savedPanel=panel.innerHTML;
      summary.innerHTML=""; miles.innerHTML=""; panel.innerHTML="";

      var htmlText="<!DOCTYPE html>\n"+document.documentElement.outerHTML;

      // すぐ画面を元に戻す
      summary.innerHTML=savedSummary; miles.innerHTML=savedMiles; panel.innerHTML=savedPanel;
      bindEvents(compute());

      var blob=new Blob([htmlText],{type:"text/html;charset=utf-8"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url; a.download="城主の資産要塞.html"; a.click();
      URL.revokeObjectURL(url);
      btn.textContent="✓ 保存しました";
      setTimeout(function(){ btn.innerHTML="⬇ このアプリをパソコンに保存する"; },1800);
    }catch(e){
      btn.textContent="保存できませんでした";
      render();
    }
  };
})();

// データの書き出し・読み込み
(function(){
  var msg=document.getElementById('dataMsg');
  function showMsg(text,color){
    if(!msg) return;
    msg.textContent=text; msg.style.color=color||"#7faa78";
    setTimeout(function(){ if(msg.textContent===text) msg.textContent=""; },2500);
  }
  var expBtn=document.getElementById('exportDataBtn');
  if(expBtn) expBtn.onclick=function(){
    var ok=exportData();
    showMsg(ok?"✓ データを書き出しました":"書き出しに失敗しました", ok?"#7faa78":"#c17b7b");
  };
  var impBtn=document.getElementById('importDataBtn');
  var impFile=document.getElementById('importDataFile');
  if(impBtn && impFile){
    impBtn.onclick=function(){ impFile.click(); };
    impFile.onchange=function(){
      var file=impFile.files[0];
      if(!file) return;
      importDataFile(file, function(ok){
        if(ok){ render(); showMsg("✓ データを読み込みました", "#7faa78"); }
        else { showMsg("読み込めませんでした（ファイル形式をご確認ください）", "#c17b7b"); }
        impFile.value="";
      });
    };
  }
})();

render();
if(restored){
  setTimeout(function(){
    var msg=document.getElementById('dataMsg');
    if(msg){ msg.textContent="前回の続きを自動で復元しました"; msg.style.color="#9aa3b2"; setTimeout(function(){ if(msg.textContent==="前回の続きを自動で復元しました") msg.textContent=""; },3000); }
  }, 100);
}
